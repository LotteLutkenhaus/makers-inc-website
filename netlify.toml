[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 4321

[[redirects]]
  from = "/products/*"
  to = "/shop/"
  status = 301

[[redirects]]
  from = "/product/*"
  to = "/shop/"
  status = 301

[[redirects]]
  from = "/collections/*"
  to = "/shop/"
  status = 301